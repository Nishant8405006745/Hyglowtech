# Hyglow — deploy API + Postgres + Next.js on Render (Blueprint).
# https://render.com/docs/blueprint-spec
#
# After deploy: open Shell on hyglowtech-api and run (once):
#   python -m scripts.bootstrap_super_admin
#
# If you rename services, update these URLs everywhere they appear below and in the dashboard:
#   https://hyglowtech-web.onrender.com
#   https://hyglowtech-api.onrender.com

version: "1"

databases:
  - name: hyglowtech-db
    plan: free
    databaseName: hyglow
    user: hyglow

services:
  - type: web
    name: hyglowtech-api
    runtime: python
    plan: free
    region: oregon
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    preDeployCommand: alembic upgrade head
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.7"
      - key: DATABASE_URL
        fromDatabase:
          name: hyglowtech-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: APP_NAME
        value: Hyglow
      - key: CORS_ORIGINS
        value: https://hyglowtech-web.onrender.com
      - key: FRONTEND_BASE_URL
        value: https://hyglowtech-web.onrender.com
      - key: LOG_PASSWORD_RESET_LINKS
        value: "false"
      - key: DB_POOL_SIZE
        value: "2"
      - key: DB_MAX_OVERFLOW
        value: "2"

  - type: web
    name: hyglowtech-web
    runtime: node
    plan: free
    region: oregon
    rootDir: frontend
    # Install devDependencies too (TypeScript, Tailwind, eslint-config-next) — Render sets NODE_ENV=production during build.
    buildCommand: npm ci --include=dev && npm run build
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: "20.18.0"
      - key: BACKEND_URL
        value: https://hyglowtech-api.onrender.com
      - key: NEXT_PUBLIC_SITE_URL
        value: https://hyglowtech-web.onrender.com
      - key: NEXT_PUBLIC_APP_NAME
        value: Hyglow
